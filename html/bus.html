<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公交实时查询</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0b0d;
    --surface: #141417;
    --surface2: #1a1a1f;
    --border: #252530;
    --text: #e8e4dd;
    --text-dim: #6b6b72;
    --accent: #ff6b35;
    --neon: #00f5d4;
    --amber: #ffd166;
    --red: #ff4d6a;
    --radius: 2px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", sans-serif;
    background:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px),
      var(--bg);
    background-size: 40px 40px;
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px;
    -webkit-font-smoothing: antialiased;
  }

  /* ---- Header ---- */
  .header {
    text-align: center;
    padding: 12px 0 28px;
  }
  .header h1 {
    font-family: "Space Mono", monospace;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 10px;
  }
  .header .meta {
    font-family: "Space Mono", monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }
  .header .meta span { color: var(--text-dim); }
  .header .countdown { color: var(--text-dim) !important; font-weight: 400 !important; }

  /* ---- Layout ---- */
  .container {
    max-width: 480px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* ---- Cards ---- */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 24px 20px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
  }

  .card-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 20px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  .card-header .dir-label {
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.5px;
    color: var(--text);
  }
  .card-header .station {
    font-family: "Space Mono", monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ---- Bus Row ---- */
  .bus-row {
    display: flex;
    align-items: center;
    padding: 16px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    gap: 16px;
    animation: rowIn 0.3s ease both;
  }
  .bus-row:last-child { border-bottom: none; }

  @keyframes rowIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .bus-icon {
    font-size: 20px;
    flex-shrink: 0;
    opacity: 0.6;
    filter: grayscale(0.3);
  }

  .bus-info {
    flex: 1;
    min-width: 0;
  }

  .bus-plate {
    font-family: "Space Mono", monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--text);
  }

  .bus-detail {
    font-family: "Space Mono", monospace;
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 3px;
    letter-spacing: 0.5px;
  }

  /* ---- ETA Number ---- */
  .bus-eta {
    text-align: right;
    flex-shrink: 0;
    min-width: 80px;
  }
  .bus-minutes {
    font-family: "Space Mono", monospace;
    font-size: 40px;
    font-weight: 700;
    line-height: 1;
    letter-spacing: -1px;
    font-variant-numeric: tabular-nums;
  }
  .bus-minutes span {
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0;
    opacity: 0.5;
  }
  .bus-minutes.soon { color: var(--neon); }
  .bus-minutes.mid  { color: var(--amber); }
  .bus-minutes.far  { color: var(--text-dim); }

  .bus-departure {
    font-family: "Space Mono", monospace;
    font-size: 16px;
    color: var(--amber);
    font-weight: 400;
    letter-spacing: 1px;
  }

  /* ---- Distance Track ---- */
  .dist-track {
    height: 4px;
    background:
      repeating-linear-gradient(
        90deg,
        transparent,
        transparent calc(12.5% - 1px),
        rgba(255,255,255,0.06) calc(12.5% - 1px),
        rgba(255,255,255,0.06) 12.5%
      ),
      linear-gradient(90deg, rgba(255,255,255,0.04), rgba(255,255,255,0.04));
    border-radius: 2px;
    margin-top: 10px;
    position: relative;
  }
  .dist-dot {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 12px; height: 12px;
    border-radius: 50%;
    transition: left 0.8s cubic-bezier(0.25, 0.1, 0.25, 1);
    z-index: 1;
  }
  .dist-dot::after {
    content: "";
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    border: 1.5px solid currentColor;
    opacity: 0.4;
    animation: dotPing 2s ease infinite;
  }
  @keyframes dotPing {
    0%, 100% { transform: scale(1); opacity: 0.3; }
    50%      { transform: scale(1.6); opacity: 0; }
  }
  .dist-dot.soon { background: var(--neon); color: var(--neon); }
  .dist-dot.mid  { background: var(--amber); color: var(--amber); }
  .dist-dot.far  { background: rgba(255,255,255,0.3); color: rgba(255,255,255,0.3); }

  /* ---- GPS Age ---- */
  .gps-age {
    font-family: "Space Mono", monospace;
    font-size: 9px;
    letter-spacing: 0.5px;
    cursor: pointer;
    user-select: none;
    display: inline-block;
    transition: opacity 0.2s;
  }
  .gps-age:hover { opacity: 0.65; }
  .gps-age .dot {
    display: inline-block;
    width: 5px; height: 5px;
    border-radius: 50%;
    margin-right: 4px;
    vertical-align: middle;
    position: relative;
    top: -1px;
  }
  .gps-age .dot.fresh { background: var(--neon); box-shadow: 0 0 4px var(--neon); }
  .gps-age .dot.warn  { background: var(--amber); }
  .gps-age .dot.stale { background: var(--red); }
  .gps-age.fresh-text { color: var(--neon); }
  .gps-age.warn-text  { color: var(--amber); }
  .gps-age.stale-text { color: var(--red); }

  /* ---- States ---- */
  .empty-state {
    text-align: center;
    padding: 28px 0 18px;
    color: var(--text-dim);
    font-family: "Space Mono", monospace;
    font-size: 11px;
    letter-spacing: 1px;
  }

  .stale-badge {
    display: inline-block;
    font-family: "Space Mono", monospace;
    font-size: 9px;
    letter-spacing: 0.5px;
    background: rgba(255,209,102,0.08);
    border: 1px solid rgba(255,209,102,0.2);
    color: var(--amber);
    padding: 3px 10px;
    border-radius: var(--radius);
    margin-bottom: 12px;
    animation: pulse 2.5s ease infinite;
  }

  .error-banner {
    background: rgba(255,77,106,0.08);
    border: 1px solid rgba(255,77,106,0.2);
    color: var(--red);
    padding: 10px 16px;
    border-radius: var(--radius);
    font-size: 12px;
    text-align: center;
    font-family: "Space Mono", monospace;
    letter-spacing: 0.5px;
  }

  /* ---- Button ---- */
  .btn-row {
    display: flex;
    justify-content: center;
    padding: 4px 0;
  }
  button {
    font-family: "Space Mono", monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    padding: 10px 32px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.3s ease;
  }
  button:hover {
    border-color: rgba(255,255,255,0.15);
    color: var(--text);
    background: rgba(255,255,255,0.02);
  }
  button:active { background: rgba(255,255,255,0.04); }

  /* ---- Animations ---- */
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.35; }
  }
  .loading .bus-icon { animation: pulse 1.2s ease infinite; }

  /* ---- Responsive ---- */
  @media (max-width: 400px) {
    body { padding: 16px 8px; }
    .card { padding: 18px 16px 16px; }
    .bus-minutes { font-size: 34px; }
    .bus-eta { min-width: 64px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Bus Tracker</h1>
  <div class="meta">
    上次刷新&nbsp;<span id="lastUpdate">--:--:--</span>
    &nbsp;/&nbsp;
    <span class="countdown" id="countdown"></span>
  </div>
</div>

<div class="container">
  <div id="errorArea"></div>

  <div class="card">
    <div class="card-header">
      <span class="dir-label">上班方向</span>
      <span class="station">圣都乐园</span>
    </div>
    <div id="busList-work"><div class="empty-state">LOADING</div></div>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="dir-label">回家方向</span>
      <span class="station">星元医院</span>
    </div>
    <div id="busList-home"><div class="empty-state">LOADING</div></div>
  </div>

  <div class="btn-row">
    <button onclick="fetchAll()">Refresh</button>
  </div>
</div>

<script>
// ============ 配置 ============
// Worker 代理地址（bus-proxy/worker.js），认证头在服务端注入
const API_BASE = "https://bus-proxy.dfly.site";

const BUS_CONFIG = [
  {
    id: "work",
    dirType: "1",
    label: "上班方向",
    station: "圣都乐园",
    query: [{
      businessType: "1",
      dirctionType: "1",
      lineCode: "1000084815476817920",
      lineStationId: "1017750926619967491",
      lineType: "1",
    }]
  },
  {
    id: "home",
    dirType: "2",
    label: "回家方向",
    station: "星元医院",
    query: [{
      businessType: "1",
      dirctionType: "2",
      lineCode: "1000084815476817920",
      lineStationId: "1016308638857428994",
      lineType: "1",
    }]
  }
];

const REFRESH_INTERVAL = 10; // 秒
let countdownSec = REFRESH_INTERVAL;
let countdownTimer = null;
// 缓存上次成功数据，网络异常时继续显示
const lastBusData = {};

// ============ 请求公交数据 ============
async function fetchBusInfo(config) {
  const resp = await fetch(API_BASE + "/api/realbus/notAuthor/line/bus/v1/timetable", {
    method: "POST",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify(config.query),
  });
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  return resp.json();
}

// ============ 工具函数 ============
function relativeTime(gpsTimeStr) {
  if (!gpsTimeStr) return null;
  try {
    let ts = Date.parse(gpsTimeStr.replace(/\//g, "-").replace(/\.\d+/, ""));
    if (isNaN(ts)) {
      const n = Number(gpsTimeStr);
      if (!isNaN(n)) ts = n > 1e12 ? n : n * 1000;
    }
    if (isNaN(ts)) return null;

    const diff = Date.now() - ts;
    if (diff < 0) return "刚刚";
    const sec = Math.floor(diff / 1000);
    if (sec < 60) return sec + "秒前";
    const min = Math.floor(sec / 60);
    if (min < 60) return min + "分钟前";
    const hr = Math.floor(min / 60);
    if (hr < 24) return hr + "小时前";
    return Math.floor(hr / 24) + "天前";
  } catch (e) {
    return null;
  }
}

function staleIndicatorText(cachedTime) {
  const diff = Date.now() - cachedTime.getTime();
  const sec = Math.floor(diff / 1000);
  if (sec < 60) return sec + "秒前";
  const min = Math.floor(sec / 60);
  if (min < 60) return min + "分钟前";
  const hr = Math.floor(min / 60);
  return hr + "小时前";
}

function formatDistance(meters) {
  return meters > 1000
    ? (meters / 1000).toFixed(1) + " 公里"
    : meters + " 米";
}

// ============ 渲染 ============
function renderBuses(containerId, data, staleTime) {
  const el = document.getElementById(containerId);
  try {
    const buses = data?.data?.[0]?.busPosition;
    if (!buses || buses.length === 0) {
      el.innerHTML = '<div class="empty-state">暂无公交信息</div>' + (staleTime ? `<div class="empty-state" style="margin-top:0;padding-top:4px;font-size:10px;color:var(--amber)">数据已过期 · ${staleIndicatorText(staleTime)}</div>` : '');
      return;
    }

    let staleBadgeHtml = "";
    if (staleTime) {
      staleBadgeHtml = `<span class="stale-badge">EXPIRED · ${staleIndicatorText(staleTime)}</span>`;
    }

    const onRoad = buses.filter(b => b.plateNumber);
    const departing = buses.filter(b => !b.plateNumber && b.departureTime);

    let html = "";

    // 路上车辆
    for (const bus of onRoad) {
      const minutes = Math.floor(bus.runTime / 60);
      let cls = "far";
      if (minutes <= 5) cls = "soon";
      else if (minutes <= 15) cls = "mid";

      const dist = formatDistance(bus.distance);
      const dotPct = Math.max(0, Math.min(100, 100 - Math.round((bus.distance / 2000) * 100)));

      // GPS 新鲜度
      const relTime = relativeTime(bus.gpsTime);
      let gpsAgeHtml = "";
      if (relTime) {
        const isFresh = relTime.includes("秒");
        const isStale = relTime.includes("小时") || relTime.includes("天");
        const ageCls = isFresh ? "fresh-text" : isStale ? "stale-text" : "warn-text";
        const dotCls = isFresh ? "fresh" : isStale ? "stale" : "warn";
        const rawTs = (bus.gpsTime || "").replace(/\.0+$/, "").replace(/\.(\d{3})\d*$/, ".$1");
        gpsAgeHtml = `<div class="gps-age ${ageCls}" data-gps-ts="${escapeHtml(bus.gpsTime)}" data-raw-ts="${escapeHtml(rawTs)}"><span class="dot ${dotCls}"></span><span class="gps-text">GPS ${escapeHtml(relTime)}</span></div>`;
      }

      html += `
        <div class="bus-row">
          <span class="bus-icon">&#x1F68C;</span>
          <div class="bus-info">
            <div class="bus-plate">${escapeHtml(bus.plateNumber)}</div>
            <div class="bus-detail">距本站 ${escapeHtml(dist)}${gpsAgeHtml}</div>
            <div class="dist-track"><div class="dist-dot ${cls}" style="left:${dotPct}%"></div></div>
          </div>
          <div class="bus-eta">
            <div class="bus-minutes ${cls}">${minutes}<span>&thinsp;分钟</span></div>
          </div>
        </div>`;
    }

    // 待发车辆
    for (const bus of departing) {
      html += `
        <div class="bus-row">
          <span class="bus-icon">&#x23F0;</span>
          <div class="bus-info">
            <div class="bus-plate">待发车</div>
            <div class="bus-detail">预计发车时间</div>
          </div>
          <div class="bus-eta">
            <div class="bus-departure">${escapeHtml(bus.departureTime)}</div>
          </div>
        </div>`;
    }

    el.innerHTML = staleBadgeHtml + (html || '<div class="empty-state">暂无公交信息</div>');

    // 错开每行动画延迟
    el.querySelectorAll(".bus-row").forEach((row, i) => {
      row.style.animationDelay = (i * 0.06) + "s";
    });
  } catch (e) {
    el.innerHTML = '<div class="empty-state">数据解析失败</div>';
  }
}

// ============ 点击 GPS 时间切换显示原始时间戳 ============
document.addEventListener("click", function(e) {
  const gps = e.target.closest(".gps-age");
  if (!gps) return;
  const textEl = gps.querySelector(".gps-text");
  if (!textEl) return;

  if (gps._showRaw) {
    const relTime = relativeTime(gps.dataset.gpsTs);
    if (relTime) textEl.textContent = "GPS " + relTime;
    gps._showRaw = false;
  } else {
    const raw = gps.dataset.rawTs;
    if (raw) textEl.textContent = raw;
    gps._showRaw = true;
  }
});

function showError(msg) {
  document.getElementById("errorArea").innerHTML =
    `<div class="error-banner">${escapeHtml(msg)}</div>`;
  setTimeout(() => {
    document.getElementById("errorArea").innerHTML = "";
  }, 8000);
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = String(str);
  return div.innerHTML;
}

// ============ GPS 时间实时刷新 ============
function refreshGpsAges() {
  document.querySelectorAll(".gps-age[data-gps-ts]").forEach(el => {
    const relTime = relativeTime(el.dataset.gpsTs);
    if (!relTime) return;
    const dot = el.querySelector(".dot");
    const text = el.querySelector(".gps-text");
    const isFresh = relTime.includes("秒");
    const isStale = relTime.includes("小时") || relTime.includes("天");
    const ageCls = isFresh ? "fresh-text" : isStale ? "stale-text" : "warn-text";
    const dotCls = isFresh ? "fresh" : isStale ? "stale" : "warn";
    el.className = "gps-age " + ageCls;
    if (dot) dot.className = "dot " + dotCls;
    if (text && !el._showRaw) text.textContent = "GPS " + relTime;
  });
}

setInterval(refreshGpsAges, 1000);

// ============ 主流程 ============
async function fetchAll() {
  let hasError = false;
  const now = new Date();
  for (const cfg of BUS_CONFIG) {
    const id = cfg.id;
    try {
      const data = await fetchBusInfo(cfg);
      lastBusData[id] = { data, time: now };
      renderBuses("busList-" + id, data, null);
    } catch (e) {
      hasError = true;
      const cached = lastBusData[id];
      if (cached) {
        renderBuses("busList-" + id, cached.data, cached.time);
      } else {
        document.getElementById("busList-" + id).innerHTML =
          '<div class="empty-state">加载失败</div>';
      }
    }
  }
  if (hasError) {
    showError("部分请求失败 — 已显示最近一次数据");
  }

  document.getElementById("lastUpdate").textContent =
    now.toLocaleTimeString("zh-CN", { hour12: false });
  resetCountdown();
}

function resetCountdown() {
  countdownSec = REFRESH_INTERVAL;
  updateCountdownDisplay();
  if (countdownTimer) clearInterval(countdownTimer);
  countdownTimer = setInterval(() => {
    countdownSec--;
    if (countdownSec <= 0) {
      fetchAll();
    } else {
      updateCountdownDisplay();
    }
  }, 1000);
}

function updateCountdownDisplay() {
  const m = Math.floor(countdownSec / 60);
  const s = countdownSec % 60;
  document.getElementById("countdown").textContent =
    `${m}:${String(s).padStart(2, "0")} 后刷新`;
}

// ============ 启动 ============
fetchAll();
</script>
</body>
</html>
