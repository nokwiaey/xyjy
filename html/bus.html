<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公交实时查询</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --border: #334155;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #38bdf8;
    --green: #4ade80;
    --orange: #fb923c;
    --red: #f87171;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
  }

  .header {
    text-align: center;
    padding: 16px 0 24px;
  }
  .header h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
  .header .meta { font-size: 13px; color: var(--muted); }
  .header .countdown { color: var(--accent); font-weight: 600; }

  .container {
    max-width: 600px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .card-header .dir-label {
    font-size: 15px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-header .station {
    font-size: 12px;
    color: var(--muted);
  }

  .bus-row {
    display: flex;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }
  .bus-row:last-child { border-bottom: none; }

  .bus-icon {
    font-size: 24px;
    flex-shrink: 0;
  }

  .bus-info { flex: 1; min-width: 0; }
  .bus-plate { font-size: 14px; font-weight: 600; }
  .bus-detail { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .bus-eta {
    text-align: right;
    flex-shrink: 0;
  }
  .bus-minutes {
    font-size: 22px;
    font-weight: 700;
    line-height: 1;
  }
  .bus-minutes.soon { color: var(--green); }
  .bus-minutes.mid { color: var(--orange); }
  .bus-minutes.far { color: var(--accent); }
  .bus-distance { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .bus-departure { font-size: 14px; color: var(--orange); font-weight: 500; }

  .empty-state {
    text-align: center;
    padding: 20px 0;
    color: var(--muted);
    font-size: 13px;
  }

  .error-banner {
    background: #7f1d1d;
    border: 1px solid var(--red);
    color: #fca5a5;
    padding: 10px 16px;
    border-radius: var(--radius);
    font-size: 13px;
    text-align: center;
  }

  .btn-row {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 8px 0;
  }
  button {
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    padding: 8px 20px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover { background: #334155; }
  button:active { background: #475569; }

  .status-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 4px;
  }
  .status-dot.on { background: var(--green); }
  .status-dot.soon-dot { background: var(--orange); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .loading .bus-icon { animation: pulse 1s infinite; }
</style>
</head>
<body>

<div class="header">
  <h1>公交实时查询</h1>
  <div class="meta">
    上次刷新：<span id="lastUpdate">--:--:--</span>
    &nbsp;·&nbsp;
    <span class="countdown" id="countdown"></span>
  </div>
</div>

<div class="container">
  <div id="errorArea"></div>

  <!-- 上班方向 -->
  <div class="card" id="card-work">
    <div class="card-header">
      <div>
        <span class="dir-label">🏢 上班方向</span>
        <span class="station">本站：圣都乐园</span>
      </div>
    </div>
    <div id="busList-work"><div class="empty-state">加载中...</div></div>
  </div>

  <!-- 回家方向 -->
  <div class="card">
    <div class="card-header">
      <div>
        <span class="dir-label">🏠 回家方向</span>
        <span class="station">本站：星元医院</span>
      </div>
    </div>
    <div id="busList-home"><div class="empty-state">加载中...</div></div>
  </div>

  <div class="btn-row">
    <button onclick="fetchAll()">🔄 立即刷新</button>
  </div>
</div>

<script>
// ============ 配置 ============
// 部署 Worker 后替换为你的 Worker URL，例如：
// const API_BASE = "https://bus-proxy.你的用户名.workers.dev";
// 本地测试可用 Python 代理，保留下面这行：
const API_BASE = "https://bus-proxy.gx090266.workers.dev/";

const HEADERS = {
  "osType": "1",
  "versionName": "1.0.0",
  "versionCode": "1",
  "realLatitude": "23.1869065",
  "realLongitude": "113.4191536",
  "realCityCode": "020",
  "deviceBrand": "Samsung",
  "systemVersion": "12",
  "channel": "1",
  "systemModel": "SM-S9110",
  "deviceId": "f7595059cbff48cebaabed23e0f901f0",
  "cityCode": "610800",
  "appCode": "D0A960E40558E85E579596F214D21E193EA16375544207EC6FF74B0FBA0C55FB",
  "requestIds": "0e78159ebf9f0bd3a738eec19fef8d7e",
  "Content-Type": "application/json; charset=UTF-8",
  "Host": "ylnb.16bus.net",
  "User-Agent": "okhttp/4.8.0",
};

const BUS_CONFIG = [
  {
    id: "work",
    dirType: "1",
    label: "上班方向",
    station: "圣都乐园",
    query: [{
      businessType: "1",
      dirctionType: "1",
      lineCode: "1000084815476817920",
      lineStationId: "1017750926619967491",
      lineType: "1",
    }]
  },
  {
    id: "home",
    dirType: "2",
    label: "回家方向",
    station: "星元医院",
    query: [{
      businessType: "1",
      dirctionType: "2",
      lineCode: "1000084815476817920",
      lineStationId: "1016308638857428994",
      lineType: "1",
    }]
  }
];

const REFRESH_INTERVAL = 5; // 秒
let countdownSec = REFRESH_INTERVAL;
let countdownTimer = null;

// ============ 请求公交数据 ============
async function fetchBusInfo(config) {
  const resp = await fetch(API_BASE + "/api/realbus/notAuthor/line/bus/v1/timetable", {
    method: "POST",
    headers: HEADERS,
    body: JSON.stringify(config.query),
  });
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  return resp.json();
}

// ============ 渲染 ============
function renderBuses(containerId, data) {
  const el = document.getElementById(containerId);
  try {
    const buses = data?.data?.[0]?.busPosition;
    if (!buses || buses.length === 0) {
      el.innerHTML = '<div class="empty-state">暂无公交信息</div>';
      return;
    }

    let html = "";
    for (const bus of buses) {
      if (bus.plateNumber) {
        // 在路上的公交
        const minutes = Math.floor(bus.runTime / 60);
        let cls = "far";
        if (minutes <= 5) cls = "soon";
        else if (minutes <= 15) cls = "mid";

        const dist = bus.distance > 1000
          ? (bus.distance / 1000).toFixed(1) + " 公里"
          : bus.distance + " 米";

        html += `
          <div class="bus-row">
            <span class="bus-icon">🚌</span>
            <div class="bus-info">
              <div class="bus-plate">${escapeHtml(bus.plateNumber)}</div>
              <div class="bus-detail">距本站 ${escapeHtml(dist)}</div>
            </div>
            <div class="bus-eta">
              <div class="bus-minutes ${cls}">${minutes}<span style="font-size:13px;font-weight:400"> 分钟</span></div>
            </div>
          </div>`;
      } else if (bus.departureTime) {
        // 尚未发车
        html += `
          <div class="bus-row">
            <span class="bus-icon">⏰</span>
            <div class="bus-info">
              <div class="bus-plate">待发车</div>
              <div class="bus-detail">预计发车时间</div>
            </div>
            <div class="bus-eta">
              <div class="bus-departure">${escapeHtml(bus.departureTime)}</div>
            </div>
          </div>`;
      }
    }
    el.innerHTML = html || '<div class="empty-state">暂无公交信息</div>';
  } catch (e) {
    el.innerHTML = '<div class="empty-state">数据解析失败</div>';
  }
}

function showError(msg) {
  document.getElementById("errorArea").innerHTML =
    `<div class="error-banner">${escapeHtml(msg)}</div>`;
  setTimeout(() => {
    document.getElementById("errorArea").innerHTML = "";
  }, 8000);
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = String(str);
  return div.innerHTML;
}

// ============ 主流程 ============
async function fetchAll() {
  let hasError = false;
  for (const cfg of BUS_CONFIG) {
    try {
      const data = await fetchBusInfo(cfg);
      renderBuses("busList-" + cfg.id, data);
    } catch (e) {
      hasError = true;
      document.getElementById("busList-" + cfg.id).innerHTML =
        '<div class="empty-state">加载失败</div>';
    }
  }
  if (hasError) {
    showError("部分请求失败 — 请确认代理已启动 (python cors_proxy.py)");
  }

  // 更新时间
  const now = new Date();
  document.getElementById("lastUpdate").textContent =
    now.toLocaleTimeString("zh-CN", { hour12: false });
  resetCountdown();
}

function resetCountdown() {
  countdownSec = REFRESH_INTERVAL;
  updateCountdownDisplay();
  if (countdownTimer) clearInterval(countdownTimer);
  countdownTimer = setInterval(() => {
    countdownSec--;
    if (countdownSec <= 0) {
      fetchAll();
    } else {
      updateCountdownDisplay();
    }
  }, 1000);
}

function updateCountdownDisplay() {
  const m = Math.floor(countdownSec / 60);
  const s = countdownSec % 60;
  document.getElementById("countdown").textContent =
    `${m}:${String(s).padStart(2, "0")} 后刷新`;
}

// ============ 启动 ============
fetchAll();
</script>
</body>
</html>
