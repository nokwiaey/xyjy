<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公交实时查询</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --border: #334155;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #38bdf8;
    --green: #4ade80;
    --orange: #fb923c;
    --red: #f87171;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
  }

  .header {
    text-align: center;
    padding: 16px 0 24px;
  }
  .header h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
  .header .meta { font-size: 13px; color: var(--muted); }
  .header .countdown { color: var(--accent); font-weight: 600; }

  .container {
    max-width: 600px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .card-header .dir-label {
    font-size: 15px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-header .station {
    font-size: 12px;
    color: var(--muted);
  }

  .bus-row {
    display: flex;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }
  .bus-row:last-child { border-bottom: none; }

  .bus-icon {
    font-size: 24px;
    flex-shrink: 0;
  }

  .bus-info { flex: 1; min-width: 0; }
  .bus-plate { font-size: 14px; font-weight: 600; cursor: pointer; }
.bus-plate:hover { color: var(--accent); }
  .bus-detail { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .bus-eta {
    text-align: right;
    flex-shrink: 0;
  }
  .bus-minutes {
    font-size: 22px;
    font-weight: 700;
    line-height: 1;
  }
  .bus-minutes.soon { color: var(--green); }
  .bus-minutes.mid { color: var(--orange); }
  .bus-minutes.far { color: var(--accent); }
  .bus-distance { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .bus-departure { font-size: 14px; color: var(--orange); font-weight: 500; }

  .empty-state {
    text-align: center;
    padding: 20px 0;
    color: var(--muted);
    font-size: 13px;
  }

  .stale-badge {
    display: inline-block;
    font-size: 11px;
    background: #78350f;
    color: #fbbf24;
    padding: 2px 8px;
    border-radius: 4px;
    margin-left: 8px;
    font-weight: 500;
    animation: pulse 2s infinite;
  }

  .error-banner {
    background: #7f1d1d;
    border: 1px solid var(--red);
    color: #fca5a5;
    padding: 10px 16px;
    border-radius: var(--radius);
    font-size: 13px;
    text-align: center;
  }

  .btn-row {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 8px 0;
  }
  button {
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    padding: 8px 20px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover { background: #334155; }
  button:active { background: #475569; }

  .status-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 4px;
  }
  .status-dot.on { background: var(--green); }
  .status-dot.soon-dot { background: var(--orange); }

  /* 可视化：距离指示点 */
  .dist-track {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 8px;
    position: relative;
  }
  .dist-dot {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 10px; height: 10px;
    border-radius: 50%;
    transition: left 0.6s ease;
    box-shadow: 0 0 6px currentColor;
  }
  .dist-dot.soon { background: var(--green); color: var(--green); }
  .dist-dot.mid  { background: var(--orange); color: var(--orange); }
  .dist-dot.far  { background: var(--accent); color: var(--accent); }

  /* 可视化：GPS 新鲜度 */
  .gps-age {
    font-size: 11px;
    margin-top: 2px;
    cursor: pointer;
    user-select: none;
  }
  .gps-age:hover { opacity: 0.8; }
  .gps-age .dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    margin-right: 4px;
    vertical-align: middle;
    position: relative;
    top: -1px;
  }
  .gps-age .dot.fresh { background: var(--green); }
  .gps-age .dot.warn  { background: var(--orange); }
  .gps-age .dot.stale { background: var(--red); }
  .gps-age.fresh-text { color: var(--green); }
  .gps-age.warn-text  { color: var(--orange); }
  .gps-age.stale-text { color: var(--red); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .loading .bus-icon { animation: pulse 1s infinite; }
</style>
</head>
<body>

<div class="header">
  <h1>公交实时查询</h1>
  <div class="meta">
    上次刷新：<span id="lastUpdate">--:--:--</span>
    &nbsp;·&nbsp;
    <span class="countdown" id="countdown"></span>
  </div>
</div>

<div class="container">
  <div id="errorArea"></div>

  <!-- 上班方向 -->
  <div class="card" id="card-work">
    <div class="card-header">
      <div>
        <span class="dir-label">🏢 上班方向</span>
        <span class="station">本站：圣都乐园</span>
      </div>
    </div>
    <div id="busList-work"><div class="empty-state">加载中...</div></div>
  </div>

  <!-- 回家方向 -->
  <div class="card">
    <div class="card-header">
      <div>
        <span class="dir-label">🏠 回家方向</span>
        <span class="station">本站：星元医院</span>
      </div>
    </div>
    <div id="busList-home"><div class="empty-state">加载中...</div></div>
  </div>

  <div class="btn-row">
    <button onclick="fetchAll()">🔄 立即刷新</button>
  </div>
</div>

<script>
// ============ 配置 ============
// Worker 代理地址（bus-proxy/worker.js），认证头在服务端注入
const API_BASE = "https://bus-proxy.dfly.site";

const BUS_CONFIG = [
  {
    id: "work",
    dirType: "1",
    label: "上班方向",
    station: "圣都乐园",
    query: [{
      businessType: "1",
      dirctionType: "1",
      lineCode: "1000084815476817920",
      lineStationId: "1017750926619967491",
      lineType: "1",
    }]
  },
  {
    id: "home",
    dirType: "2",
    label: "回家方向",
    station: "星元医院",
    query: [{
      businessType: "1",
      dirctionType: "2",
      lineCode: "1000084815476817920",
      lineStationId: "1016308638857428994",
      lineType: "1",
    }]
  }
];

const REFRESH_INTERVAL = 10; // 秒
let countdownSec = REFRESH_INTERVAL;
let countdownTimer = null;
// 缓存上次成功数据，网络异常时继续显示
const lastBusData = {};

// ============ 请求公交数据 ============
async function fetchBusInfo(config) {
  // 简单请求：text/plain 不触发 CORS 预检，Worker 在服务端注入认证头
  const resp = await fetch(API_BASE + "/api/realbus/notAuthor/line/bus/v1/timetable", {
    method: "POST",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify(config.query),
  });
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  return resp.json();
}

// ============ 工具函数 ============
function relativeTime(gpsTimeStr) {
  if (!gpsTimeStr) return null;
  try {
    // 尝试多种格式：ISO、yyyy-MM-dd HH:mm:ss、时间戳
    let ts = Date.parse(gpsTimeStr.replace(/\//g, "-").replace(/\.\d+/, ""));
    if (isNaN(ts)) {
      const n = Number(gpsTimeStr);
      if (!isNaN(n)) ts = n > 1e12 ? n : n * 1000;
    }
    if (isNaN(ts)) return null;

    const diff = Date.now() - ts;
    if (diff < 0) return "刚刚";
    const sec = Math.floor(diff / 1000);
    if (sec < 60) return sec + "秒前";
    const min = Math.floor(sec / 60);
    if (min < 60) return min + "分钟前";
    const hr = Math.floor(min / 60);
    if (hr < 24) return hr + "小时前";
    return Math.floor(hr / 24) + "天前";
  } catch (e) {
    return null;
  }
}

function staleIndicatorText(cachedTime) {
  const diff = Date.now() - cachedTime.getTime();
  const sec = Math.floor(diff / 1000);
  if (sec < 60) return sec + "秒前";
  const min = Math.floor(sec / 60);
  if (min < 60) return min + "分钟前";
  const hr = Math.floor(min / 60);
  return hr + "小时前";
}

function formatDistance(meters) {
  return meters > 1000
    ? (meters / 1000).toFixed(1) + " 公里"
    : meters + " 米";
}

// ============ 渲染 ============
function renderBuses(containerId, data, staleTime) {
  const el = document.getElementById(containerId);
  try {
    const buses = data?.data?.[0]?.busPosition;
    if (!buses || buses.length === 0) {
      el.innerHTML = '<div class="empty-state">暂无公交信息</div>' + (staleTime ? `<div class="empty-state" style="margin-top:0;padding-top:0;font-size:11px;color:#fbbf24">数据已过期 · ${staleIndicatorText(staleTime)}</div>` : '');
      return;
    }

    // 数据过期徽标
    let staleBadgeHtml = "";
    if (staleTime) {
      staleBadgeHtml = `<span class="stale-badge" title="上次成功更新时间：${staleTime.toLocaleTimeString("zh-CN",{hour12:false})}">⚠ 数据已过期 · ${staleIndicatorText(staleTime)}</span>`;
    }

    const onRoad = buses.filter(b => b.plateNumber);
    const departing = buses.filter(b => !b.plateNumber && b.departureTime);

    let html = "";

    // 路上车辆
    for (const bus of onRoad) {
      const minutes = Math.floor(bus.runTime / 60);
      let cls = "far";
      if (minutes <= 5) cls = "soon";
      else if (minutes <= 15) cls = "mid";

      const dist = formatDistance(bus.distance);
      // 距离指示点：左端=2000m，右端=0m
      const dotPct = Math.max(0, Math.min(100, 100 - Math.round((bus.distance / 2000) * 100)));

      // GPS 新鲜度
      const relTime = relativeTime(bus.gpsTime);
      let gpsAgeHtml = "";
      if (relTime) {
        const isFresh = relTime.includes("秒");
        const isStale = relTime.includes("小时") || relTime.includes("天");
        const ageCls = isFresh ? "fresh-text" : isStale ? "stale-text" : "warn-text";
        const dotCls = isFresh ? "fresh" : isStale ? "stale" : "warn";
        const rawTs = (bus.gpsTime || "").replace(/\.0+$/, "").replace(/\.(\d{3})\d*$/, ".$1");
        gpsAgeHtml = `<div class="gps-age ${ageCls}" data-gps-ts="${escapeHtml(bus.gpsTime)}" data-raw-ts="${escapeHtml(rawTs)}"><span class="dot ${dotCls}"></span><span class="gps-text">GPS ${escapeHtml(relTime)}</span></div>`;
      }

      html += `
        <div class="bus-row">
          <span class="bus-icon">🚌</span>
          <div class="bus-info">
            <div class="bus-plate">${escapeHtml(bus.plateNumber)}</div>
            <div class="bus-detail">距本站 ${escapeHtml(dist)}${gpsAgeHtml}</div>
            <div class="dist-track"><div class="dist-dot ${cls}" style="left:${dotPct}%"></div></div>
          </div>
          <div class="bus-eta">
            <div class="bus-minutes ${cls}">${minutes}<span style="font-size:13px;font-weight:400"> 分钟</span></div>
          </div>
        </div>`;
    }

    // 待发车辆
    for (const bus of departing) {
      html += `
        <div class="bus-row">
          <span class="bus-icon">⏰</span>
          <div class="bus-info">
            <div class="bus-plate">待发车</div>
            <div class="bus-detail">预计发车时间</div>
          </div>
          <div class="bus-eta">
            <div class="bus-departure">${escapeHtml(bus.departureTime)}</div>
          </div>
        </div>`;
    }

    el.innerHTML = staleBadgeHtml + html || '<div class="empty-state">暂无公交信息</div>';
  } catch (e) {
    el.innerHTML = '<div class="empty-state">数据解析失败</div>';
  }
}

// ============ 点击 GPS 时间切换显示原始时间戳 ============
document.addEventListener("click", function(e) {
  const gps = e.target.closest(".gps-age");
  if (!gps) return;
  const textEl = gps.querySelector(".gps-text");
  if (!textEl) return;

  if (gps._showRaw) {
    // 切回相对时间
    const relTime = relativeTime(gps.dataset.gpsTs);
    if (relTime) textEl.textContent = "GPS " + relTime;
    gps._showRaw = false;
  } else {
    // 显示原始时间戳
    const raw = gps.dataset.rawTs;
    if (raw) textEl.textContent = raw;
    gps._showRaw = true;
  }
});

function showError(msg) {
  document.getElementById("errorArea").innerHTML =
    `<div class="error-banner">${escapeHtml(msg)}</div>`;
  setTimeout(() => {
    document.getElementById("errorArea").innerHTML = "";
  }, 8000);
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = String(str);
  return div.innerHTML;
}

// ============ GPS 时间实时刷新 ============
function refreshGpsAges() {
  document.querySelectorAll(".gps-age[data-gps-ts]").forEach(el => {
    const relTime = relativeTime(el.dataset.gpsTs);
    if (!relTime) return;
    const dot = el.querySelector(".dot");
    const text = el.querySelector(".gps-text");
    const isFresh = relTime.includes("秒");
    const isStale = relTime.includes("小时") || relTime.includes("天");
    const ageCls = isFresh ? "fresh-text" : isStale ? "stale-text" : "warn-text";
    const dotCls = isFresh ? "fresh" : isStale ? "stale" : "warn";
    el.className = "gps-age " + ageCls;
    if (dot) dot.className = "dot " + dotCls;
    if (text && !el._showRaw) text.textContent = "GPS " + relTime;
  });
}

setInterval(refreshGpsAges, 1000);

// ============ 主流程 ============
async function fetchAll() {
  let hasError = false;
  const now = new Date();
  for (const cfg of BUS_CONFIG) {
    const id = cfg.id;
    try {
      const data = await fetchBusInfo(cfg);
      lastBusData[id] = { data, time: now };
      renderBuses("busList-" + id, data, null);
    } catch (e) {
      hasError = true;
      const cached = lastBusData[id];
      if (cached) {
        renderBuses("busList-" + id, cached.data, cached.time);
      } else {
        document.getElementById("busList-" + id).innerHTML =
          '<div class="empty-state">加载失败</div>';
      }
    }
  }
  if (hasError) {
    showError("部分请求失败 — 已显示最近一次数据");
  }

  // 更新时间
  document.getElementById("lastUpdate").textContent =
    now.toLocaleTimeString("zh-CN", { hour12: false });
  resetCountdown();
}

function resetCountdown() {
  countdownSec = REFRESH_INTERVAL;
  updateCountdownDisplay();
  if (countdownTimer) clearInterval(countdownTimer);
  countdownTimer = setInterval(() => {
    countdownSec--;
    if (countdownSec <= 0) {
      fetchAll();
    } else {
      updateCountdownDisplay();
    }
  }, 1000);
}

function updateCountdownDisplay() {
  const m = Math.floor(countdownSec / 60);
  const s = countdownSec % 60;
  document.getElementById("countdown").textContent =
    `${m}:${String(s).padStart(2, "0")} 后刷新`;
}

// ============ 启动 ============
fetchAll();
</script>
</body>
</html>
